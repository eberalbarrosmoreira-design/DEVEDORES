<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#1E3A5F" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Devedores" />
<title>Controle de Devedores</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#F1F5F9;overscroll-behavior:none;color:#111;font-size:14px}
input,select,textarea,button{font-size:16px!important;font-family:inherit}
.bg-header{background:linear-gradient(135deg,#1E3A5F,#2563EB);color:#fff;padding:18px 16px 14px;position:sticky;top:0;z-index:10}
.bg-card{background:linear-gradient(135deg,#1E3A5F,#1D4ED8);color:#fff;border-radius:14px;padding:14px 16px;margin:12px 12px 0;box-shadow:0 4px 16px rgba(30,58,95,.18)}
.card{border-radius:14px;margin:10px 12px 0;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.06);overflow:hidden;cursor:pointer}
.card2{border-radius:14px;margin:12px;padding:16px;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.container{max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:80px;position:relative}
.flex{display:flex}.flex1{flex:1}.gap{gap:6px}.gap8{gap:8px}.space-between{justify-content:space-between}.items-center{align-items:center}
.p12{padding:12px}.p12-0{padding:12px 12px 0}.text-center{text-align:center}.text-right{text-align:right}
.f11{font-size:11px}.f12{font-size:12px}.f13{font-size:13px}.f14{font-size:14px}.f15{font-size:15px}.f16{font-size:16px}.f20{font-size:20px}.f22{font-size:22px}.f28{font-size:28px}.f40{font-size:40px}
.bold{font-weight:600}.bold7{font-weight:700}.bold8{font-weight:800}
.op75{opacity:.75}.gray{color:#6B7280}.gray2{color:#9CA3AF}.gray3{color:#CBD5E1}.dark{color:#1E293B}.dark2{color:#374151}.blue{color:#1E3A5F}
.uppercase{text-transform:uppercase}.ls{letter-spacing:.06em}.ls2{letter-spacing:-.02em}.ls3{letter-spacing:-.03em}
.btn{padding:13px;border:none;font-weight:600;cursor:pointer;width:100%;margin-bottom:10px;border-radius:12px;font-size:14px}
.btn-primary{background:linear-gradient(135deg,#1E3A5F,#2563EB);color:#fff;font-size:15px;font-weight:700;padding:14px}
.btn-danger{background:#FEE2E2;color:#991B1B}.btn-secondary{background:#E2E8F0;color:#475569}
.btn-sm{padding:10px;font-size:12px;margin-bottom:0;border-radius:12px;font-weight:600;border:none;cursor:pointer}
.btn-green{background:#D1FAE5;color:#065F46}.btn-indigo{background:#E0E7FF;color:#3730A3}
.filter-btn{padding:6px 14px;border-radius:20px;border:none;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap}
.filter-btn-active{background:#1D4ED8;color:#fff}.filter-btn-inactive{background:#E2E8F0;color:#475569}
.input-group{background:#fff;border:1.5px solid #E2E8F0;border-radius:10px;display:flex;align-items:center;padding:0 12px;gap:8px;margin:10px 12px 0}
.input-group input{flex:1;border:none;outline:none;padding:10px 0;font-size:14px;background:transparent;color:#1E293B}
.form-input{width:100%;padding:11px 12px;border-radius:10px;border:1.5px solid #E2E8F0;font-size:14px;outline:none;background:#fff;margin-bottom:14px}
.form-label{font-size:12px;font-weight:600;color:#374151;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;display:block}
.badge{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:3px 10px;font-size:12px;font-weight:700;white-space:nowrap}
.badge-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.stat-item{flex:1;background:rgba(255,255,255,.12);border-radius:8px;padding:7px 10px;text-align:center}
.stat-num{font-size:18px;font-weight:700}.stat-lbl{font-size:10px;opacity:.75}
.filter-row{display:flex;gap:6px;padding:12px 12px 0;overflow-x:auto}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1E293B;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 4px 12px rgba(0,0,0,.2);z-index:999}
.fab{position:fixed;bottom:20px;right:16px;width:54px;height:54px;border-radius:27px;background:linear-gradient(135deg,#1E3A5F,#2563EB);color:#fff;border:none;font-size:28px;cursor:pointer;box-shadow:0 4px 16px rgba(37,99,235,.4);display:flex;align-items:center;justify-content:center;z-index:100}
.back-btn{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:0 8px 0 0}
.import-label{flex:1;padding:10px;border-radius:12px;background:#DBEAFE;color:#1E40AF;border:none;font-size:12px;font-weight:600;cursor:pointer;text-align:center;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>
<div id="app"></div>
<script>
(function(){
  var STATUS={"Pendente":{bg:"#FFF3CD",color:"#856404",dot:"#FFC107"},"Pago":{bg:"#D1FAE5",color:"#065F46",dot:"#10B981"},"Pago Parcial":{bg:"#FEE2CC",color:"#92400E",dot:"#F97316"},"Vencido":{bg:"#FEE2E2",color:"#991B1B",dot:"#EF4444"}};
  var EMPTY={nome:"",contato:"",pix:"",profissao:"",residencia:"",dataEmprestimo:"",valor:"",dataVencimento:"",status:"Pendente",obs:""};
  var KEY="devedores_app";
  var S={devedores:[],view:"lista",form:{},editId:null,detailId:null,filtro:"Todos",busca:"",msg:""};
  for(var k in EMPTY)S.form[k]=EMPTY[k];
  var ICONS={lupa:String.fromCodePoint(0x1F50D),user:String.fromCodePoint(0x1F464),check:String.fromCodePoint(0x2705),x:String.fromCodePoint(0x274C),edit:String.fromCodePoint(0x270F),trash:String.fromCodePoint(0x1F5D1),plus:String.fromCodePoint(0x2795),left:String.fromCodePoint(0x2B05),csv:String.fromCodePoint(0x1F4C4),json:String.fromCodePoint(0x1F4CB),importI:String.fromCodePoint(0x1F4E5),search:String.fromCodePoint(0x1F50D)};
  function fmt(v){var n=parseFloat(String(v).replace(",","."));return isNaN(n)?"R$ 0,00":n.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});}
  function pv(v){return parseFloat(String(v).replace(",","."))||0;}
  function esc(t){if(!t)return"";return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function salvar(arr){try{localStorage.setItem(KEY,JSON.stringify(arr))}catch(e){}S.devedores=arr;render();}
  function msg(t){S.msg=t;render();setTimeout(function(){S.msg="";render()},2500);}
  function dload(blob,nome){var url=URL.createObjectURL(blob);var iOS=/iPad|iPhone|iPod/.test(navigator.userAgent)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);if(iOS){window.open(url,'_blank');setTimeout(function(){URL.revokeObjectURL(url)},5000);}else{var a=document.createElement("a");a.href=url;a.download=nome;a.target="_blank";document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(function(){URL.revokeObjectURL(url)},1000);}}
  function expCSV(){if(!S.devedores.length){msg("Nenhum dado!");return;}var h="Nome,Contato,Pix,Profissao,Residencia,DataEmprestimo,Valor,DataVencimento,Status,Obs";var l=S.devedores.map(function(d){return'"'+[d.nome,d.contato||"",d.pix||"",d.profissao||"",d.residencia||"",d.dataEmprestimo||"",d.valor||"",d.dataVencimento||"",d.status,(d.obs||"").replace(/"/g,'""')].join('","')+'"';});dload(new Blob(["\uFEFF"+h+"\n"+l.join("\n")],{type:"text/csv;charset=utf-8;"}),"devedores_"+new Date().toISOString().slice(0,10)+".csv");msg("CSV exportado!");}
  function expJSON(){if(!S.devedores.length){msg("Nenhum dado!");return;}dload(new Blob([JSON.stringify(S.devedores,null,2)],{type:"application/json"}),"devedores_"+new Date().toISOString().slice(0,10)+".json");msg("JSON exportado!");}
  function imp(e){var f=e.target.files?e.target.files[0]:null;if(!f)return;var r=new FileReader();r.onload=function(ev){try{var imp;var txt=ev.target.result;if(f.name.endsWith(".csv")){var lin=txt.replace(/\r/g,"").split("\n").filter(function(l){return l.trim();});if(lin.length<2){msg("CSV vazio");return;}var cab=lin[0].split(",").map(function(h){return h.replace(/^"|"$/g,"").trim();});var mapa={"Nome":"nome","Contato":"contato","Pix":"pix","Profissao":"profissao","Residencia":"residencia","DataEmprestimo":"dataEmprestimo","Valor":"valor","DataVencimento":"dataVencimento","Status":"status","Obs":"obs"};imp=[];for(var i=1;i<lin.length;i++){var v=lin[i].split(",").map(function(x){return x.replace(/^"|"$/g,"").trim();});var o={};cab.forEach(function(c,idx){o[mapa[c]||c]=v[idx]||"";});if(o.nome)imp.push(o);}}else{imp=JSON.parse(txt);if(!Array.isArray(imp))throw new Error("Formato invalido");}var novos=imp.map(function(d){var o={};for(var k in EMPTY)o[k]=EMPTY[k];for(var k in d)o[k]=d[k];o.id=Date.now()+Math.random()*10000;return o;});var comb=S.devedores.concat(novos);salvar(comb);msg(novos.length+" registro(s) importado(s)!");}catch(err){msg("Erro: "+err.message);}};if(f.name.endsWith(".csv"))r.readAsText(f,"UTF-8");else r.readAsText(f);e.target.value="";}
  function submit(){if(!S.form.nome.trim()){msg("Preencha o nome!");return;}var nova;if(S.editId!==null){nova=S.devedores.map(function(d){return d.id===S.editId?Object.assign({},S.form,{id:S.editId}):d;});msg("Atualizado!");}else{nova=S.devedores.concat([Object.assign({},S.form,{id:Date.now()})]);msg("Cadastrado!");}salvar(nova);for(var k in EMPTY)S.form[k]=EMPTY[k];S.editId=null;S.view="lista";render();}
  function del(id){if(!confirm("Remover?"))return;salvar(S.devedores.filter(function(d){return d.id!==id;}));S.view="lista";msg("Removido!");}
  function editar(d){for(var k in EMPTY)S.form[k]=EMPTY[k];for(var k in d)S.form[k]=d[k];S.editId=d.id;S.view="form";render();}
  function render(){var app=document.getElementById("app");app.innerHTML="";if(S.view==="lista")rLista(app);else if(S.view==="form")rForm(app);else if(S.view==="detail")rDetail(app);if(S.msg){var t=document.createElement("div");t.className="toast";t.textContent=S.msg;app.appendChild(t);}}
  function rDetail(c){var d=S.devedores.find(function(x){return x.id===S.detailId;});if(!d){S.view="lista";render();return;}var cfg=STATUS[d.status]||STATUS["Pendente"];var h='<div class="container">';h+='<div class="bg-header"><div class="flex items-center gap8"><button class="back-btn" onclick="window.vLista()">'+ICONS.left+'</button><div><h1>'+esc(d.nome)+'</h1><div class="f12 op75">Detalhes</div></div></div></div>';h+='<div class="p12"><div class="flex space-between items-center">';h+='<span class="badge" style="background:'+cfg.bg+';color:'+cfg.color+'"><span class="badge-dot" style="background:'+cfg.dot+'"></span>'+esc(d.status)+'</span>';h+='<span class="f22 bold8 blue">'+fmt(d.valor)+'</span></div></div>';h+='<div class="card2"><div class="f11 bold gray2 uppercase ls" style="margin-bottom:10px">'+ICONS.user+' Informacoes</div>';if(d.nome)h+='<div style="margin-bottom:6px"><div class="f11 gray bold uppercase ls">Nome</div><div class="f14 dark" style="margin-top:1px">'+esc(d.nome)+'</div></div>';if(d.contato)h+='<div style="margin-bottom:6px"><div class="f11 gray bold uppercase ls">Contato</div><div class="f14 dark" style="margin-top:1px">'+esc(d.contato)+'</div></div>';if(d.pix)h+='<div style="margin-bottom:6px"><div class="f11 gray bold uppercase ls">Pix</div><div class="f14 dark" style="margin-top:1px">'+esc(d.pix)+'</div></div>';if(d.profissao)h+='<div style="margin-bottom:6px"><div class="f11 gray bold uppercase ls">Profissao</div><div class="f14 dark" style="margin-top:1px">'+esc(d.profissao)+'</div></div>';if(d.residencia)h+='<div style="margin-bottom:6px"><div class="f11 gray bold uppercase ls">Residencia</div><div class="f14 dark" style="margin-top:1px">'+esc(d.residencia)+'</div></div>';h+='</div><div class="card2" style="margin-top:0"><div class="f11 bold gray2 uppercase ls" style="margin-bottom:10px">Divida</div>';if(d.dataEmprestimo)h+='<div style="margin-bottom:6px"><div class="f11 gray bold uppercase ls">Emprestimo</div><div class="f14 dark" style="margin-top:1px">'+esc(d.dataEmprestimo)+'</div></div>';h+='<div style="margin-bottom:6px"><div class="f11 gray bold uppercase ls">Valor</div><div class="f14 dark" style="margin-top:1px">'+fmt(d.valor)+'</div></div>';if(d.dataVencimento)h+='<div style="margin-bottom:6px"><div class="f11 gray bold uppercase ls">Vencimento</div><div class="f14 dark" style="margin-top:1px">'+esc(d.dataVencimento)+'</div></div>';if(d.obs)h+='<div style="margin-bottom:6px"><div class="f11 gray bold uppercase ls">Obs</div><div class="f14 dark" style="margin-top:1px">'+esc(d.obs)+'</div></div>';h+='</div><div class="p12">';h+='<button class="btn btn-primary" onclick="window.eById('+d.id+')">'+ICONS.edit+' Editar</button>';h+='<button class="btn btn-danger" onclick="window.delById('+d.id+')">'+ICONS.trash+' Remover</button>';h+='<button class="btn btn-secondary" onclick="window.vLista()">Voltar</button></div></div>';c.innerHTML=h;}
  function rForm(c){var tit=S.editId?"Editar":"Novo Devedor";var h='<div class="container"><div class="bg-header"><div class="flex items-center gap8"><button class="back-btn" onclick="window.cancel()">'+ICONS.left+'</button><div><h1>'+tit+'</h1><div class="f12 op75">Preencha os dados</div></div></div></div>';h+='<div class="p12" style="margin-top:16px">';var campos=[["Nome *","nome","text","Joao Silva"],["Contato","contato","tel","(82)99999-9999"],["Pix","pix","text","CPF ou e-mail"],["Profissao","profissao","text","Ex: Comerciante"],["Residencia","residencia","text","Rua, numero"],["Data Emprestimo","dataEmprestimo","date",""],["Valor R$","valor","number","0,00"],["Vencimento","dataVencimento","date",""]];campos.forEach(function(c2){h+='<label class="form-label">'+c2[0]+'</label>';h+='<input class="form-input" type="'+c2[2]+'" placeholder="'+c2[3]+'" value="'+esc(S.form[c2[1]]||"")+'" oninput="window.up(\''+c2[1]+'\',this.value)">';});h+='<label class="form-label">Status</label><select class="form-input" onchange="window.up(\'status\',this.value)">';for(var k in STATUS)h+='<option'+(S.form.status===k?' selected':'')+'>'+k+'</option>';h+='</select><label class="form-label">Obs</label>';h+='<textarea class="form-input" placeholder="Anotacoes..." oninput="window.up(\'obs\',this.value)">'+esc(S.form.obs||"")+'</textarea>';h+='<button class="btn btn-primary" onclick="window.sub()">'+ICONS.check+' '+(S.editId?"Salvar":"Cadastrar")+'</button>';h+='<button class="btn btn-secondary" onclick="window.cancel()">Cancelar</button></div></div>';c.innerHTML=h;}
  function rLista(c){var fil=S.devedores.filter(function(d){return(S.filtro==="Todos"||d.status===S.filtro)&&d.nome.toLowerCase().indexOf(S.busca.toLowerCase())!==-1;});var total=S.devedores.filter(function(d){return d.status!=="Pago";}).reduce(function(s,d){return s+pv(d.valor);},0);var cnt={};for(var k in STATUS)cnt[k]=0;S.devedores.forEach(function(d){if(cnt[d.status]!==undefined)cnt[d.status]++;});var h='<div class="container">';h+='<div class="bg-header"><h1>'+ICONS.user+' Controle de Devedores</h1><div class="f12 op75">'+S.devedores.length+' pessoa'+(S.devedores.length!==1?"s":"")+'</div></div>';h+='<div class="bg-card"><div class="f11 op75 bold uppercase ls">Total em aberto</div>';h+='<div class="f28 bold8 ls3">'+total.toLocaleString("pt-BR",{style:"currency",currency:"BRL"})+'</div>';h+='<div class="flex gap8" style="margin-top:10px">';for(var k in cnt)h+='<div class="stat-item"><div class="stat-num">'+cnt[k]+'</div><div class="stat-lbl">'+k+'</div></div>';h+='</div></div>';h+='<div class="flex gap p12-0">';h+='<button class="btn-sm btn-green flex1" onclick="window.expCSV()">'+ICONS.csv+' CSV</button>';h+='<button class="btn-sm btn-indigo flex1" onclick="window.expJSON()">'+ICONS.json+' JSON</button>';h+='<label class="import-label">'+ICONS.importI+' Importar<input type="file" accept=".json,.csv" style="display:none" onchange="window.imp(event)"></label></div>';h+='<div class="filter-row">';var fs=["Todos"].concat(Object.keys(STATUS));fs.forEach(function(f){h+='<button class="filter-btn '+(S.filtro===f?"filter-btn-active":"filter-btn-inactive")+'" onclick="window.setF(\''+f+'\')">'+f+'</button>';});h+='</div><div class="input-group"><span class="gray2">'+ICONS.lupa+'</span>';h+='<input placeholder="Buscar..." value="'+esc(S.busca)+'" oninput="window.setB(this.value)">';if(S.busca)h+='<button style="background:none;border:none;color:#9CA3AF;cursor:pointer;font-size:16px" onclick="window.setB(\'\')">'+ICONS.x+'</button>';h+='</div>';if(!fil.length){h+='<div class="text-center" style="margin-top:48px;color:#9CA3AF"><div class="f40">'+ICONS.user+'</div><div class="f14">'+(S.devedores.length?"Nada encontrado":"Nenhum devedor ainda")+'</div>';if(!S.devedores.length)h+='<div class="f13 gray3">Toque no +</div>';h+='</div>';}else{fil.forEach(function(d){var cfg=STATUS[d.status]||STATUS["Pendente"];h+='<div class="card" onclick="window.det('+d.id+')">';h+='<div style="padding:12px 14px 10px;border-bottom:1px solid #F1F5F9"><div class="flex space-between items-start">';h+='<div class="f15 bold dark">'+esc(d.nome)+'</div>';h+='<span class="badge" style="background:'+cfg.bg+';color:'+cfg.color+'"><span class="badge-dot" style="background:'+cfg.dot+'"></span>'+esc(d.status)+'</span></div>';var m=[d.profissao,d.residencia].filter(Boolean).join(" - ")||"Sem detalhes";h+='<div class="f12 gray" style="margin-top:2px">'+esc(m)+'</div></div>';h+='<div class="flex space-between items-center" style="padding:10px 14px"><div><div class="f11 gray">Valor</div><div class="f16 bold8 blue">'+fmt(d.valor)+'</div></div>';if(d.dataVencimento)h+='<div class="text-right"><div class="f11 gray">Vencimento</div><div class="f13 bold dark2">'+d.dataVencimento+'</div></div>';h+='<span class="gray3 f20">&rsaquo;</span></div></div>';});}h+='<button class="fab" onclick="window.novo()">'+ICONS.plus+'</button></div>';c.innerHTML=h;}
  window.vLista=function(){S.view="lista";render();};window.cancel=function(){S.view="lista";for(var k in EMPTY)S.form[k]=EMPTY[k];S.editId=null;render();};window.novo=function(){for(var k in EMPTY)S.form[k]=EMPTY[k];S.editId=null;S.view="form";render();};window.det=function(id){S.detailId=id;S.view="detail";render();};window.setF=function(f){S.filtro=f;render();};window.setB=function(v){S.busca=v;render();};window.up=function(k,v){S.form[k]=v;};window.sub=submit;window.delById=function(id){del(id);};window.eById=function(id){var d=S.devedores.find(function(x){return x.id===id;});if(d)editar(d);};window.expCSV=expCSV;window.expJSON=expJSON;window.imp=imp;
  try{var raw=localStorage.getItem(KEY);if(raw)S.devedores=JSON.parse(raw);}catch(e){}
  render();
})();
</script>
</body>
</html>
