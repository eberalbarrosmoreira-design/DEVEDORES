<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#111827" />
<title>Admin - Devedores</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0F172A;color:#E2E8F0;font-size:14px;padding:16px}
input,select,textarea,button{font-size:16px!important;font-family:inherit}
h1{font-size:22px;margin-bottom:4px;color:#F8FAFC}
h2{font-size:16px;color:#94A3B8;margin:20px 0 12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.card{background:#1E293B;border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid #334155}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.card-header h3{font-size:15px;color:#F1F5F9}
.tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700}
.tag-ok{background:#065F46;color:#6EE7B7}
.tag-warn{background:#78350F;color:#FCD34D}
.tag-info{background:#1E3A5F;color:#93C5FD}
.input-group{margin-bottom:12px}
.input-group label{display:block;font-size:11px;color:#94A3B8;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.input-group input,.input-group select{width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid #334155;font-size:14px;outline:none;background:#0F172A;color:#E2E8F0}
.input-group input:focus{border-color:#3B82F6}
.btn{padding:11px 16px;border:none;font-weight:600;cursor:pointer;border-radius:10px;font-size:13px}
.btn-primary{background:#3B82F6;color:#fff;width:100%}
.btn-danger{background:#DC2626;color:#fff}
.btn-sm{background:#334155;color:#E2E8F0;padding:6px 12px;font-size:12px}
.flex{display:flex}.flex1{flex:1}.gap{gap:8px}.space-between{justify-content:space-between}.items-center{align-items:center}.wrap{flex-wrap:wrap}
.mt{margin-top:12px}.mb{margin-bottom:12px}
.f12{font-size:12px}.f13{font-size:13px}.f14{font-size:14px}.f20{font-size:20px}
.gray{color:#94A3B8}.gray2{color:#64748B}.green{color:#6EE7B7}.red{color:#FCA5A5}.blue{color:#93C5FD}.yellow{color:#FCD34D}
.bold{font-weight:600}
.mono{font-family:'Courier New',monospace;font-size:11px;word-break:break-all;color:#94A3B8;background:#0F172A;padding:6px 8px;border-radius:6px;margin-top:4px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1E293B;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;border:1px solid #334155}
.tab{padding:8px 14px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600}
.tab-active{background:#3B82F6;color:#fff}
.tab-inactive{background:#334155;color:#94A3B8}
.codigo-gerado{background:#0F172A;border:1px dashed #3B82F6;border-radius:10px;padding:14px;margin-top:10px;display:none}
.codigo-gerado .codigo-texto{font-size:13px;word-break:break-all;font-family:monospace;color:#93C5FD;margin:8px 0;user-select:all}
.alerta{background:#78350F;border:1px solid #FCD34D;border-radius:10px;padding:12px;font-size:12px;color:#FCD34D;margin-bottom:12px}
.alerta-ok{background:#064E3B;border:1px solid #6EE7B7;border-radius:10px;padding:12px;font-size:12px;color:#6EE7B7;margin-bottom:12px}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #3B82F6;border-radius:50%;border-top-color:transparent;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app"></div>
<script>
(function(){
  var AUTH_HASH = "af061661de073014e86f163d7bb541de0ea9957c37f1b80aa1aacabc2d033207";
  var CONFIG_KEY = "dev_admin_config";
  var STORAGE_KEY = "dev_admin_clientes";
  var ATIVACOES_KEY = "dev_ativacoes";
  var API = "https://api.github.com";
  var cfg = {token:"",user:"eberalbarrosmoreira-design",repo:"DEVEDORES",hashMestre:"af061661de073014e86f163d7bb541de0ea9957c37f1b80aa1aacabc2d033207"};
  var cli = [];
  
  function sha256(s){
    return crypto.subtle.digest("SHA-256",new TextEncoder().encode(s)).then(function(h){
      return Array.from(new Uint8Array(h)).map(function(b){return b.toString(16).padStart(2,"0")}).join("");
    });
  }
  
  function login(){
    document.getElementById("app").innerHTML=
      '<div style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0F172A;display:flex;align-items:center;justify-content:center">'+
      '<div style="background:#1E293B;border-radius:20px;padding:32px 24px;width:300px;border:1px solid #334155;text-align:center">'+
      '<h2 style="color:#F8FAFC;font-size:20px;margin-bottom:4px">🔒 Admin</h2>'+
      '<p style="color:#94A3B8;font-size:13px;margin-bottom:20px">Digite a senha mestra</p>'+
      '<input type="password" id="lSenha" style="width:100%;padding:12px;border-radius:12px;border:2px solid #334155;font-size:15px;outline:none;margin-bottom:12px;text-align:center;background:#0F172A;color:#E2E8F0" placeholder="Senha mestra" autocomplete="off">'+
      '<button id="lBtn" style="padding:12px;background:#3B82F6;color:#fff;border:none;border-radius:12px;width:100%;font-weight:600;cursor:pointer;font-size:14px">Entrar</button>'+
      '<div id="lMsg" style="font-size:12px;color:#FCA5A5;margin-top:8px"></div></div></div>';
    document.getElementById("lBtn").onclick=function(){
      var s=document.getElementById("lSenha").value;if(!s)return;
      sha256(s).then(function(h){if(h.split("").reduce(function(a,c){return a+c.charCodeAt(0)},0)===AUTH_HASH.split("").reduce(function(a,c){return a+c.charCodeAt(0)},0)&&h===AUTH_HASH)app();else document.getElementById("lMsg").textContent="Senha invalida!";});
    };
    document.getElementById("lSenha").onkeydown=function(e){if(e.key==="Enter")document.getElementById("lBtn").click();};
  }
  
  function app(){
    var h='<h1>🔒 Painel de Controle</h1><p class="f12 gray" style="margin-bottom:20px">Gerencie senhas e dispositivos dos clientes</p>';
    h+='<div class="alerta" id="aToken" style="display:none">🔑 Configure o token na aba "Config" (ghp_...) e clique em Salvar!</div>';
    h+='<div class="flex gap wrap mb">';
    h+='<button class="tab tab-active" id="t0" onclick="mt(0)">👥 Clientes</button>';
    h+='<button class="tab tab-inactive" id="t1" onclick="mt(1)">🔑 Ativar</button>';
    h+='<button class="tab tab-inactive" id="t2" onclick="mt(2)">🚀 Publicar</button>';
    h+='<button class="tab tab-inactive" id="t3" onclick="mt(3)">⚙️ Config</button></div>';
    h+='<div id="c0"><div class="card"><h2>➕ Novo Cliente</h2>';
    h+='<div class="input-group"><label>Nome</label><input type="text" id="iNome" placeholder="Ex: Joao"></div>';
    h+='<div class="input-group"><label>Senha de Acesso</label><input type="text" id="iSenha" placeholder="Ex: joao123"></div>';
    h+='<div class="input-group"><label>Limite de Dispositivos</label><input type="number" id="iLim" value="2" min="1" max="20"></div>';
    h+='<button class="btn btn-primary" onclick="addCli()">➕ Adicionar</button></div>';
    h+='<h2>📋 Clientes Cadastrados</h2><div id="listaCli"></div></div>';
    h+='<div id="c1" style="display:none"><div class="card"><h2>🔑 Liberar Dispositivo</h2><p class="f12 gray mb">Cliente te enviou um codigo? Cole abaixo e gere a liberacao.</p>';
    h+='<div class="input-group"><label>Cliente</label><select id="sCli"></select></div>';
    h+='<div class="input-group"><label>Codigo do Dispositivo</label><input type="text" id="iCod" placeholder="Codigo que o cliente enviou"></div>';
    h+='<button class="btn btn-primary" onclick="gerar()">🔑 Gerar Codigo</button>';
    h+='<div class="codigo-gerado" id="cg"><div class="f12 gray bold">✅ Codigo de Ativacao:</div><div class="codigo-texto" id="cgTxt"></div><button class="btn" style="background:#334155;color:#E2E8F0;padding:6px 12px;font-size:12px" onclick="copiar()">📋 Copiar</button></div></div>';
    h+='<h2>📱 Dispositivos Ativos</h2><div id="listaDis"></div></div>';
    h+='<div id="c2" style="display:none"><div class="card"><h2>🚀 Publicar (1 clique!)</h2><p class="f12 gray mb">Altera o index.html no GitHub com os dados abaixo.</p>';
    h+='<div style="background:#0F172A;border:1px solid #334155;border-radius:10px;padding:12px;font-size:12px;font-family:monospace;white-space:pre-wrap;word-break:break-all;max-height:200px;overflow:auto" id="prev"></div>';
    h+='<div style="margin-top:12px"><button class="btn btn-primary" onclick="pub()" id="btnPub">🚀 Publicar Agora</button></div>';
    h+='<div class="alerta-ok" id="stPub" style="display:none;margin-top:12px"></div>';
    h+='<div class="alerta" id="erPub" style="display:none;margin-top:12px"></div></div></div>';
    h+='<div id="c3" style="display:none"><div class="card"><h2>⚙️ Configuracao GitHub</h2>';
    h+='<div class="input-group"><label>Token</label><input type="password" id="iToken" placeholder="ghp_..."></div>';
    h+='<div class="input-group"><label>Usuario</label><input type="text" id="iUser" value="eberalbarrosmoreira-design"></div>';
    h+='<div class="input-group"><label>Repositorio</label><input type="text" id="iRepo" value="DEVEDORES"></div>';
    h+='<div class="input-group"><label>Hash Mestre</label><input type="text" id="iHM" value="af061661de073014e86f163d7bb541de0ea9957c37f1b80aa1aacabc2d033207" style="font-family:monospace;font-size:11px"></div>';
    h+='<button class="btn btn-primary" onclick="saveCfg()">💾 Salvar</button></div>';
    h+='<h2>🔄 Acoes</h2><div class="card"><button class="btn btn-sm" style="background:#DC2626;color:#fff;width:100%" onclick="resetDis()">🗑️ Resetar TODOS os dispositivos</button></div></div>';
    h+='<div id="toast" class="toast" style="display:none"></div>';
    document.getElementById("app").innerHTML=h;
    carregar();
  }
  
  function carregar(){
    try{var rc=localStorage.getItem(CONFIG_KEY);if(rc)cfg=JSON.parse(rc);var rl=localStorage.getItem(STORAGE_KEY);if(rl)cli=JSON.parse(rl);}catch(e){}
    if(document.getElementById("iToken"))document.getElementById("iToken").value=cfg.token||"";
    if(document.getElementById("iUser"))document.getElementById("iUser").value=cfg.user;
    if(document.getElementById("iRepo"))document.getElementById("iRepo").value=cfg.repo;
    if(document.getElementById("iHM"))document.getElementById("iHM").value=cfg.hashMestre;
    if(!cfg.token&&document.getElementById("aToken"))document.getElementById("aToken").style.display="block";
    render();
  }
  
  function saveCfg(){
    cfg.token=document.getElementById("iToken").value.trim();
    cfg.user=document.getElementById("iUser").value.trim();
    cfg.repo=document.getElementById("iRepo").value.trim();
    cfg.hashMestre=document.getElementById("iHM").value.trim();
    localStorage.setItem(CONFIG_KEY,JSON.stringify(cfg));
    if(cfg.token&&document.getElementById("aToken"))document.getElementById("aToken").style.display="none";
    msg("✅ Salvo! Token: "+cfg.token.substring(0,10)+"...");
  }
  
  function msg(t){var e=document.getElementById("toast");if(!e)return;e.textContent=t;e.style.display="block";setTimeout(function(){e.style.display="none"},3000);}
  function esc(t){if(!t)return"";return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  
  function gCode(){if(!cli.length)return"{}";var l=[];cli.forEach(function(c){l.push('"'+c.hash+'": '+c.limite);});return '{\n      '+l.join(',\n      ')+'\n    }';}
  
  window.addCli=function(){
    var n=document.getElementById("iNome").value.trim(),s=document.getElementById("iSenha").value.trim(),l=parseInt(document.getElementById("iLim").value)||2;
    if(!n||!s){msg("Preencha nome e senha!");return;}if(l<1){msg("Limite minimo 1");return;}
    sha256(s).then(function(h){cli.push({id:Date.now(),nome:n,hash:h,senhaOriginal:s,limite:l});salvar();document.getElementById("iNome").value="";document.getElementById("iSenha").value="";msg("✅ Cliente \""+n+"\" adicionado! Senha: "+s);});
  };
  
  window.remCli=function(id){if(!confirm("Remover?"))return;cli=cli.filter(function(c){return c.id!==id;});salvar();msg("Removido!");};
  
  function salvar(){localStorage.setItem(STORAGE_KEY,JSON.stringify(cli));render();}
  
  window.mt=function(t){
    for(var i=0;i<4;i++){var e=document.getElementById("c"+i);if(e)e.style.display=i===t?"block":"none";var te=document.getElementById("t"+i);if(te)te.className="tab "+(i===t?"tab-active":"tab-inactive");}
    if(t===1)renderAtivar();if(t===2)renderPrev();
  };
  
  window.gerar=function(){
    var id=parseInt(document.getElementById("sCli").value),cod=document.getElementById("iCod").value.trim();
    if(!id){msg("Selecione cliente!");return;}if(!cod){msg("Digite o codigo!");return;}
    var c=cli.find(function(x){return x.id===id;});if(!c){msg("Cliente nao encontrado!");return;}
    sha256(cfg.hashMestre+cod).then(function(cg){document.getElementById("cgTxt").textContent=cg;document.getElementById("cg").style.display="block";msg("✅ Codigo gerado!");});
  };
  
  window.copiar=function(){
    var t=document.getElementById("cgTxt").textContent;
    navigator.clipboard.writeText(t).then(function(){msg("📋 Copiado!");}).catch(function(){var ta=document.createElement("textarea");ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);msg("📋 Copiado!");});
  };
  
  window.resetDis=function(){if(!confirm("Resetar TODOS?"))return;localStorage.removeItem(ATIVACOES_KEY);msg("✅ Resetado!");renderAtivar();};
  window.remDis=function(id){if(!confirm("Remover?"))return;var at=JSON.parse(localStorage.getItem(ATIVACOES_KEY)||"{}");delete at[id];localStorage.setItem(ATIVACOES_KEY,JSON.stringify(at));msg("✅ Removido!");renderAtivar();};
  
  window.pub=function(){
    var btn=document.getElementById("btnPub"),st=document.getElementById("stPub"),er=document.getElementById("erPub");
    st.style.display="none";er.style.display="none";
    var tokenUsar=cfg.token||document.getElementById("iToken").value.trim();if(!tokenUsar||tokenUsar.length<10){er.textContent="❌ Token invalido! Digite na aba Config e clique Salvar.";er.style.display="block";return;}cfg.token=tokenUsar;
    btn.innerHTML='<span class="spinner"></span> Publicando...';btn.disabled=true;
    var url=API+"/repos/"+cfg.user+"/"+cfg.repo+"/contents/index.html";
    fetch(url,{headers:{"Authorization":"token "+cfg.token,"Accept":"application/vnd.github.v3+json"}})
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.message&&d.message!=="OK")throw new Error(d.message);
      var sha=d.sha;
      var dec=decodeURIComponent(Array.prototype.map.call(window.atob(d.content),function(c){return '%'+('00'+c.charCodeAt(0).toString(16)).slice(-2);}).join(''));
      var code=gCode();
      var novo=dec.replace(/clientes:\s*\{[\s\S]*?\}\s*,/,'clientes: '+code+',');
      if(novo===dec)throw new Error("Nao achou bloco clientes no index.html");
      var enc=new TextEncoder(),bytes=enc.encode(novo),bin='';
      for(var i=0;i<bytes.length;i++)bin+=String.fromCharCode(bytes[i]);
      var b64=btoa(bin);
      return fetch(url,{method:"PUT",headers:{"Authorization":"token "+cfg.token,"Accept":"application/vnd.github.v3+json","Content-Type":"application/json"},body:JSON.stringify({message:"🤖 Admin: atualizacao automatica",content:b64,sha:sha})}).then(function(r){return r.json();});
    })
    .then(function(r){if(r.content){st.innerHTML="✅ Publicado!<br><span class='f12'>Aguarde ~1-2 min.</span>";st.style.display="block";msg("🚀 Publicado!");}else throw new Error(r.message||"Erro");})
    .catch(function(e){er.textContent="❌ "+e.message;er.style.display="block";})
    .finally(function(){btn.innerHTML="🚀 Publicar Agora";btn.disabled=false;});
  };
  
  function render(){renderLista();renderAtivar();renderPrev();}
  
  function renderLista(){
    var div=document.getElementById("listaCli");if(!div)return;
    if(!cli.length){div.innerHTML='<div class="card" style="text-align:center;padding:24px"><div class="f20 gray">👥</div><div class="f13 gray">Nenhum cliente</div></div>';return;}
    var h="";
    cli.forEach(function(c){
      var at=JSON.parse(localStorage.getItem(ATIVACOES_KEY)||"{}"),q=0;for(var i in at){if(at[i]===c.hash)q++;}
      h+='<div class="card"><div class="card-header"><h3>'+esc(c.nome)+'</h3><div class="flex gap"><span class="tag tag-info">'+q+'/'+c.limite+' disp.</span><button class="btn btn-sm" style="background:#DC2626;color:#fff" onclick="remCli('+c.id+')">✕</button></div></div>';
      h+='<div class="f12 green"><span class="bold">✅ Senha:</span> <code style="background:#0F172A;padding:2px 6px;border-radius:4px;color:#6EE7B7">'+esc(c.senhaOriginal)+'</code></div></div>';
    });
    div.innerHTML=h;
  }
  
  function renderAtivar(){
    var sel=document.getElementById("sCli");if(!sel)return;
    var o='<option value="">Selecione...</option>';
    cli.forEach(function(c){o+='<option value="'+c.id+'">'+esc(c.nome)+' ('+c.limite+' disp.)</option>';});
    sel.innerHTML=o;
    var div=document.getElementById("listaDis");if(!div)return;
    var at=JSON.parse(localStorage.getItem(ATIVACOES_KEY)||"{}"),ch=Object.keys(at);
    if(!ch.length){div.innerHTML='<div class="card" style="text-align:center;padding:24px"><div class="f20 gray">📱</div><div class="f13 gray">Nenhum dispositivo ativo</div></div>';return;}
    var h="";
    ch.forEach(function(d){
      var cn="Desconhecido";cli.forEach(function(c){if(c.hash===at[d])cn=c.nome;});
      h+='<div class="card"><div class="flex space-between items-center"><div><div class="f13 bold">'+esc(cn)+'</div><div class="mono" style="font-size:10px;margin-top:2px">'+d.substring(0,30)+'...</div></div><button class="btn btn-sm" style="background:#DC2626;color:#fff" onclick="remDis(\''+d+'\')">✕</button></div></div>';
    });
    h+='<button class="btn btn-sm" style="background:#DC2626;color:#fff;width:100%;margin-top:8px" onclick="resetDis()">🗑️ Resetar Todos</button>';
    div.innerHTML=h;
  }
  
  function renderPrev(){var e=document.getElementById("prev");if(e)e.textContent=gCode();}
  
  login();
})();
</script>
</body>
</html>
